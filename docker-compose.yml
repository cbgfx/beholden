services:
  beholden:
    build: .
    container_name: beholden
    ports:
      - "2385:2385"
    environment:
      - NODE_ENV=production
      - PORT=2385
      - HOST=0.0.0.0
      - BEHOLDEN_DATA_DIR=/data
    volumes:
      - beholden_data:/data
    restart: unless-stopped

volumes:
  beholden_data:
